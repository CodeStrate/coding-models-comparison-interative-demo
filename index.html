<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Gauntlet — Local LLM Coding Benchmark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;0,900;1,400;1,700&family=JetBrains+Mono:wght@400;500;600;700&family=League+Gothic&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- No flash while theme change fix -->
     <script>
      (function () {
        var theme = localStorage.getItem('theme') || 'system'
        var resolved = theme === 'system' ?
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : theme
        document.documentElement.dataset.theme = resolved
      })()
     </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
